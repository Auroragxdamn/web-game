version: '3.8'

services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      PORT: 3000
    expose:
      - "3000"
    volumes:
      - server-data:/app/data
    restart: unless-stopped

volumes:
  server-data:
